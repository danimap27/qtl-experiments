# =============================================================
# GLOBAL CONFIGURATION
# =============================================================
experiment_name: "qtl_revision_v2"
output_dir: "./results"
device: "auto"   # "auto" = Use GPU if available, fallback to CPU

# =============================================================
# RANDOM SEEDS
# =============================================================
seeds: [0, 42, 123, 456, 789]

# =============================================================
# DATASETS
# =============================================================
datasets:
  - name: "hymenoptera"
    path: "./data/datasets/hymenoptera"
    num_classes: 2
    image_size: 224
  - name: "brain_tumor"
    path: "./data/datasets/brain_tumor"
    num_classes: 2
    image_size: 224
  - name: "cats_vs_dogs"
    path: "./data/datasets/cats_dogs"
    num_classes: 2
    image_size: 224
  - name: "solar_dust"
    path: "./data/datasets/solar_dust"
    num_classes: 2
    image_size: 224

# =============================================================
# FEATURE EXTRACTORS (BACKBONES)
# =============================================================
backbones:
  - name: "resnet18"
    feature_dim: 512
  - name: "mobilenetv2"
    feature_dim: 1280
  - name: "efficientnet_b0"
    feature_dim: 1280
  - name: "regnet_x_400mf"
    feature_dim: 400

# =============================================================
# EXPERIMENT HEADS
# =============================================================
heads:
  # --- Classical Heads ---
  - name: "linear"
    type: "classical"
    description: "Standard Linear baseline: single layer without non-linearity"

  - name: "mlp_a"
    type: "classical"
    description: "Parameter-matched MLP (~12 params): Linear->tanh->Linear"
    hidden_dim: 4
    activation: "tanh"

  - name: "mlp_b"
    type: "classical"
    description: "Standard MLP baseline: 128->ReLU->64->ReLU->Classes"
    hidden_dims: [128, 64]
    activation: "relu"

  # --- PennyLane Quantum Heads ---
  - name: "pl_ideal"
    type: "pennylane"
    description: "PennyLane Ideal: default.qubit simulator with parameter-shift"
    backend: "default.qubit"
    n_qubits: 4
    depth: 3
    noise: false
    noise_channels: []
    gradient_method: "spsa"

  - name: "pl_noisy"
    type: "pennylane"
    description: "PennyLane Noisy: default.mixed with Heron r2 calibration"
    backend: "default.mixed"
    n_qubits: 4
    depth: 3
    noise: true
    gradient_method: "spsa"
    noise_channels: ["amplitude_damping", "phase_damping", "depolarizing"]
    noise_params:
      T1_us: 250
      T2_us: 150
      t1q_ns: 32
      t2q_ns: 68
      p1q: 0.0002
      p2q: 0.005
      readout_error: 0.012

  # --- Qiskit Quantum Heads ---
  - name: "qk_ideal"
    type: "qiskit"
    description: "Qiskit Ideal: StatevectorSampler with EstimatorQNN"
    backend: "statevector"
    n_qubits: 4
    depth: 3
    noise: false
    shots: null
    gradient_method: "spsa"

  - name: "qk_noisy"
    type: "qiskit"
    description: "Qiskit Noisy: AerSampler with SamplerQNN and Heron r2 noise"
    backend: "aer"
    n_qubits: 4
    depth: 3
    noise: true
    shots: 1024
    gradient_method: "spsa"
    noise_params:
      T1_us: 250
      T2_us: 150
      p1q: 0.0002
      p2q: 0.005
      readout_error: 0.012

# =============================================================
# TRAINING HYPERPARAMETERS
# =============================================================
training:
  optimizer: "adam"
  lr: 0.001
  batch_size: 16
  epochs: 10
  scheduler:
    type: "step_lr"
    step_size: 3
    gamma: 0.9
  loss: "cross_entropy"

# =============================================================
# ENERGY TRACKING (CodeCarbon)
# =============================================================
energy:
  enabled: true
  tool: "codecarbon"

# =============================================================
# ADDITIONAL STUDIES
# =============================================================

# --- Ablation Study: Qubits vs Circuit Depth ---
ablation:
  enabled: true
  datasets: ["hymenoptera", "solar_dust"]
  backbones: ["resnet18"]
  heads: ["pl_ideal", "qk_ideal", "pl_noisy", "qk_noisy"]
  qubits: [4, 8, 16]
  depths: [1, 3, 5]
  seeds: [42]

# --- Noise Decomposition: Impact per Channel ---
noise_decomposition:
  enabled: true
  datasets: ["hymenoptera", "brain_tumor", "cats_vs_dogs", "solar_dust"]
  backbones: ["resnet18", "mobilenetv2", "efficientnet_b0", "regnet_x_400mf"]
  base_head: "pl_noisy"
  channels:
    - name: "amplitude_damping"
      noise_channels: ["amplitude_damping"]
    - name: "phase_damping"
      noise_channels: ["phase_damping"]
    - name: "depolarizing"
      noise_channels: ["depolarizing"]
  n_qubits: 4
  depth: 3
  seeds: [42]

# --- Simulated Conditions for Scalability Results ---
sim_as_hardware:
  enabled: true
  datasets: ["hymenoptera"]
  backbones: ["resnet18", "mobilenetv2", "efficientnet_b0", "regnet_x_400mf"]
  heads: ["linear", "pl_ideal", "pl_noisy", "qk_ideal", "qk_noisy"]
  epochs: 5
  shots_override: 100
  seeds: [42]

# --- Barren Plateaus Analysis ---
barren_plateaus:
  enabled: true
  datasets: ["hymenoptera"]
  backbones: ["resnet18"]
  heads: ["pl_ideal", "pl_noisy"]
  n_initializations: 200
  qubits: [2, 4, 6]
  depth: 3

# --- Scalability: Hardware Transpilation ---
transpilation:
  enabled: true
  qubits: [2, 4, 6, 8]
  depth: 3
  backend: "ibm_torino"

# =============================================================
# CHECKPOINTS
# =============================================================
checkpoints:
  enabled: true
  # Save best model (by validation accuracy)
  save_best: true
  # Save last checkpoint at the end of every epoch
  save_last: true
  # Save a checkpoint every N epochs (0 = disabled)
  save_every_n_epochs: 1
  # Resume from last checkpoint if found in output_dir
  resume: true

# =============================================================
# VISUALIZATION
# =============================================================
visualization:
  enabled: true
  # Output directory relative to execution folder
  plots_subdir: "plots"
  # Standard plots for classification tasks
  classification:
    - learning_curves
    - confusion_matrix
    - roc_curve
    - pr_curve
    - class_metrics
    - probability_histogram
    - classification_summary
  # Resolution in DPI
  dpi: 150
